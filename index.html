<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Fixed Pricelist</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SEARCH AREA -->
<div class="search-container">

  <!-- HEADER ROW -->
  <div class="header-row">
    <h1>Fixed Pricelist</h1>
    <button id="modeToggle">R</button>
  </div>

  <!-- OPTIONAL SUBTEXT -->
  <!--
  <p class="subtext">
    Transparent and uniform pricing for all customers
  </p>
  -->

  <!-- SEARCH -->
  <div class="search-wrapper">
    <input
      id="searchInput"
      type="text"
      placeholder="Search product..."
      autocomplete="off"
    >
    <span id="clearSearch">×</span>
  </div>

</div>

<!-- RESULTS -->
<div id="results"></div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
