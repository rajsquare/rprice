<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Pricelist</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SEARCH AREA -->
<div class="search-container">

  <!-- HEADER ROW -->
  <div class="header-row">
    <h1>Pricelist</h1>
    <div class="header-actions">
      <button id="billingSwitchBtn" class="app-switch-btn">BILLING</button>
      <button id="modeToggle">W</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrapper">
    <input
      id="searchInput"
      type="text"
      placeholder="Search product..."
      autocomplete="off"
    >

    <!-- CLEAR BUTTON -->
    <div id="clearSearch">
      <span class="clear-x">×</span>
    </div>
  </div>

  <!-- MATERIAL FILTER -->
  <div id="materialFilter" class="material-filter">

    <div class="filter-label">
      Filter by material
    </div>

    <div class="filter-buttons">

      <button
        class="filter-btn"
        data-material="Brass"
      >
        Brass
      </button>

      <button
        class="filter-btn"
        data-material="Copper"
      >
        Copper
      </button>

      <button
        class="filter-btn"
        data-material="Kansa"
      >
        Kansa
      </button>

    </div>

  </div>

</div>

<!-- RESULTS -->
<div id="results"></div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
